<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChoreVerse — MeriLaundry prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --mist:#EAF3F2; --ink:#0F2A2B; --ink-soft:#5B7374; --ink-faint:#8FA3A3;
  --line:#E2ECEB; --card:#FFFFFF;
  --teal:#0E9BA0; --teal-deep:#0B7A7E; --teal-tint:#E1F3F3;
  --marigold:#F6A623; --marigold-deep:#D9870A; --marigold-tint:#FDF1DC;
  --indigo:#4F46E5; --indigo-deep:#3A32C0; --indigo-tint:#ECEBFC;
  --green:#16A06B; --green-tint:#DEF3EA;
  --amber:#E8920C; --red:#E0573E; --red-tint:#FBE7E2;
  --shadow:0 10px 30px rgba(15,42,43,.10); --shadow-sm:0 2px 8px rgba(15,42,43,.07);
  --r:18px; --r-sm:12px;
  --disp:'Plus Jakarta Sans',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:var(--body);color:var(--ink);background:#0c1f20;-webkit-font-smoothing:antialiased;line-height:1.45}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
img{max-width:100%;display:block}
svg{width:18px;height:18px;flex-shrink:0;vertical-align:middle}
.hidden{display:none!important}

/* ===== Perspective bar ===== */
#persona-bar{position:sticky;top:0;z-index:50;background:linear-gradient(100deg,#1c1840,#2a2470);
  color:#fff;display:flex;align-items:center;gap:14px;padding:9px 16px;flex-wrap:wrap}
#persona-bar .cv-logo{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:800;font-size:15px;letter-spacing:.2px}
#persona-bar .cv-logo .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#7d76ff,#4F46E5);display:grid;place-items:center}
#persona-bar .lbl{font-size:11px;color:#b9b4f0;text-transform:uppercase;letter-spacing:.12em;margin-left:6px}
.pchips{display:flex;gap:7px;flex-wrap:wrap;flex:1}
.pchip{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.09);
  font-size:13px;font-weight:600;color:#d9d6ff;transition:.15s;white-space:nowrap}
.pchip:hover{background:rgba(255,255,255,.16)}
.pchip.on{background:#fff;color:#2a2470}
.pchip svg{width:16px;height:16px}
#persona-bar .reset{font-size:12px;color:#b9b4f0;font-weight:600;padding:6px 10px;border-radius:8px}
#persona-bar .reset:hover{background:rgba(255,255,255,.12)}

/* ===== Stage ===== */
#stage{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:26px 16px 60px}
.help-fab{position:fixed;top:14px;right:16px;z-index:120;width:40px;height:40px;border-radius:50%;background:#fff;
  box-shadow:0 6px 18px rgba(15,42,43,.22);display:grid;place-items:center;color:var(--indigo);transition:.15s}
.help-fab:hover{transform:scale(1.06)}
.help-fab svg{width:22px;height:22px}
#help-layer{position:fixed;inset:0;z-index:110;display:none}
#help-layer.open{display:block}
.help-scrim{position:absolute;inset:0;background:rgba(8,18,30,.74);backdrop-filter:blur(3px)}
.help-modal{position:absolute;inset:0;overflow-y:auto;padding:64px 16px 40px;display:flex;justify-content:center}
.help-close{position:fixed;top:14px;right:16px;z-index:130;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.16);color:#fff;display:grid;place-items:center}
.help-close:hover{background:rgba(255,255,255,.28)}

/* ===== Phone frame ===== */
.phone{width:390px;max-width:100%;background:#0c1f20;border-radius:46px;padding:11px;box-shadow:0 30px 70px rgba(0,0,0,.5);position:relative}
.phone .notch{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#0c1f20;border-radius:0 0 18px 18px;z-index:30}
.screen{background:var(--mist);border-radius:36px;overflow:hidden;height:780px;max-height:calc(100vh - 60px);display:flex;flex-direction:column;position:relative}
.statusbar{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:12px;font-weight:700;color:var(--ink);flex-shrink:0;background:transparent}
.statusbar .right{display:flex;gap:5px;align-items:center}
.statusbar .right svg{width:15px;height:15px}
.viewport{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.viewport::-webkit-scrollbar{width:0}

/* ===== Desktop frame ===== */
.laptop{width:min(1080px,100%);background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;display:flex;min-height:640px}
.lt-side{width:230px;background:#1c1840;color:#cfcbf5;flex-shrink:0;padding:22px 14px;display:flex;flex-direction:column;gap:4px}
.lt-side .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 20px;font-family:var(--disp);font-weight:800;color:#fff;font-size:17px}
.lt-side .brand .dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#7d76ff,#4F46E5);display:grid;place-items:center}
.lt-nav{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;font-size:14px;font-weight:600;color:#b9b4f0;transition:.15s}
.lt-nav svg{width:18px;height:18px}
.lt-nav:hover{background:rgba(255,255,255,.07);color:#fff}
.lt-nav.on{background:var(--indigo);color:#fff}
.lt-side .who{margin-top:auto;padding:13px;border-radius:12px;background:rgba(255,255,255,.06);font-size:12.5px;color:#cfcbf5}
.lt-side .who b{color:#fff;display:block;font-size:13px}
.lt-main{flex:1;background:#F6F8FB;overflow-y:auto;max-height:calc(100vh - 60px)}
.lt-top{display:flex;align-items:center;justify-content:space-between;padding:20px 30px;border-bottom:1px solid #ECEFF4;background:#fff;position:sticky;top:0;z-index:5}
.lt-top h1{font-family:var(--disp);font-size:21px;margin:0;font-weight:800}
.lt-top .sub{font-size:13px;color:var(--ink-soft);margin-top:2px}
.lt-body{padding:26px 30px}

/* generic */
.row{display:flex;gap:12px}.between{justify-content:space-between}.center{align-items:center}.wrap{flex-wrap:wrap}
.muted{color:var(--ink-soft)}.faint{color:var(--ink-faint)}
.grow{flex:1}.tac{text-align:center}.tar{text-align:right}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.b{font-weight:700}.sb{font-weight:600}
.sec-pad{padding:18px 18px 0}

/* ===== App (mobile) shell ===== */
.appbar{background:var(--teal);color:#fff;padding:16px 18px 30px;border-radius:0 0 26px 26px;flex-shrink:0;position:relative;overflow:hidden}
.appbar.indigo{background:var(--indigo)}
.appbar::after{content:"";position:absolute;right:-40px;top:-50px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.08)}
.appbar .ml-logo{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:800;font-size:18px;position:relative;z-index:1}
.appbar .ml-logo .bub{width:30px;height:30px;border-radius:10px;background:rgba(255,255,255,.22);display:grid;place-items:center}
.appbar .hi{font-size:13px;opacity:.9;margin-top:2px}
.ml-mark .bub{background:#fff;color:var(--teal)}

.bnav{display:flex;background:#fff;border-top:1px solid var(--line);flex-shrink:0;padding:6px 4px 8px}
.bnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;color:var(--ink-faint);font-size:11px;font-weight:600;border-radius:12px}
.bnav button svg{width:23px;height:23px}
.bnav button.on{color:var(--teal)}
.bnav button.on svg{stroke-width:2.4}

.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:16px;margin:14px 18px}
.card.flush{margin:0}
.tile{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:15px}
h2.scr{font-family:var(--disp);font-size:19px;margin:0}
.kicker{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal)}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:15px 20px;border-radius:14px;
  background:var(--teal);color:#fff;font-weight:700;font-size:15.5px;width:100%;transition:.12s;box-shadow:0 6px 16px rgba(14,155,160,.28)}
.btn:active{transform:translateY(1px)}
.btn svg{width:20px;height:20px}
.btn.gold{background:var(--marigold);box-shadow:0 6px 16px rgba(246,166,35,.3);color:#3a2600}
.btn.green{background:var(--green);box-shadow:0 6px 16px rgba(22,160,107,.28)}
.btn.ind{background:var(--indigo);box-shadow:0 6px 16px rgba(79,70,229,.28)}
.btn.ghost{background:#fff;color:var(--teal);border:1.5px solid var(--teal-tint);box-shadow:none}
.btn.dark{background:var(--ink)}
.btn.sm{padding:10px 14px;font-size:13.5px;width:auto;border-radius:11px;box-shadow:none}
.btn.lg{padding:17px 22px;font-size:16.5px}
.btn[disabled]{opacity:.45;box-shadow:none;pointer-events:none}

.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;font-size:12px;font-weight:700}
.pill svg{width:13px;height:13px}
.pill.teal{background:var(--teal-tint);color:var(--teal-deep)}
.pill.gold{background:var(--marigold-tint);color:var(--marigold-deep)}
.pill.green{background:var(--green-tint);color:var(--green)}
.pill.red{background:var(--red-tint);color:var(--red)}
.pill.ind{background:var(--indigo-tint);color:var(--indigo-deep)}
.pill.grey{background:#EEF2F2;color:var(--ink-soft)}

.field{margin-top:13px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;background:#fff;outline:none;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal)}
.divider{height:1px;background:var(--line);margin:14px 0}

.avatar{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-weight:800;color:#fff;font-family:var(--disp);flex-shrink:0}

.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
  padding:13px 20px;border-radius:14px;font-weight:600;font-size:14px;box-shadow:var(--shadow);z-index:200;opacity:0;
  transition:.28s;display:flex;align-items:center;gap:10px;max-width:330px;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:18px;height:18px;color:#5fe0a8}

@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(246,166,35,.5)}70%{box-shadow:0 0 0 12px rgba(246,166,35,0)}100%{box-shadow:0 0 0 0 rgba(246,166,35,0)}}
.pulse{animation:pulse 1.8s infinite}
@keyframes pop{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
.viewport>*{animation:pop .22s ease}

/* timeline */
.tl{list-style:none;margin:0;padding:0}
.tl li{display:flex;gap:13px;position:relative;padding-bottom:18px}
.tl li:last-child{padding-bottom:0}
.tl li .nod{width:26px;height:26px;border-radius:50%;background:#fff;border:2px solid var(--line);display:grid;place-items:center;flex-shrink:0;z-index:1}
.tl li .nod svg{width:13px;height:13px;color:var(--ink-faint)}
.tl li.done .nod{background:var(--green);border-color:var(--green)}
.tl li.done .nod svg{color:#fff}
.tl li.now .nod{background:var(--teal);border-color:var(--teal)}
.tl li.now .nod svg{color:#fff}
.tl li:not(:last-child):before{content:"";position:absolute;left:12px;top:26px;bottom:0;width:2px;background:var(--line)}
.tl li.done:before{background:var(--green)}
.tl .t-main{font-weight:700;font-size:14px}
.tl .t-sub{font-size:12px;color:var(--ink-soft)}
.tl li.pending .t-main{color:var(--ink-faint);font-weight:600}

/* desktop cards/tables */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi{background:#fff;border:1px solid #ECEFF4;border-radius:14px;padding:18px}
.kpi .lab{font-size:12.5px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:7px}
.kpi .lab svg{width:15px;height:15px;color:var(--indigo)}
.kpi .num{font-family:var(--disp);font-size:27px;font-weight:800;margin-top:8px}
.kpi .num small{font-size:14px;font-weight:700;color:var(--ink-soft)}
.dcard{background:#fff;border:1px solid #ECEFF4;border-radius:14px;padding:20px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);padding:0 12px 10px;font-weight:700}
td{padding:12px;border-top:1px solid #F0F2F6;font-size:14px;vertical-align:middle}
tr:hover td{background:#FAFBFD}
.toggle{width:44px;height:25px;border-radius:999px;background:#D4DAE2;position:relative;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on::after{left:22px}

/* switcher landing */
.land{width:min(960px,100%);color:#fff;padding:10px 6px}
.land .hero{text-align:center;padding:24px 10px 30px}
.land .hero .eyebrow{font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#9b94f0}
.land .hero h1{font-family:var(--disp);font-size:clamp(30px,6vw,46px);font-weight:800;margin:12px 0 0;line-height:1.05}
.land .hero h1 .tl-grad{background:linear-gradient(100deg,#7d76ff,#42d4cf);-webkit-background-clip:text;background-clip:text;color:transparent}
.land .hero p{color:#bfc6d6;max-width:540px;margin:14px auto 0;font-size:15.5px}
.role-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:8px}
.role-card{background:#16213a;border:1px solid #243150;border-radius:18px;padding:20px;text-align:left;transition:.16s;position:relative;overflow:hidden}
.role-card:hover{transform:translateY(-3px);border-color:#3a4a72;box-shadow:0 16px 40px rgba(0,0,0,.4)}
.role-card .ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;margin-bottom:14px}
.role-card .ic svg{width:24px;height:24px;color:#fff}
.role-card h3{font-family:var(--disp);font-size:17px;margin:0;color:#fff}
.role-card .ph{font-size:12.5px;color:#7c87a0;margin-top:3px;font-weight:600}
.role-card .ds{font-size:13px;color:#aab3c8;margin-top:10px;line-height:1.5}
.role-card .dev{position:absolute;top:16px;right:16px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#6b748c;background:#0f1830;padding:4px 8px;border-radius:7px}
.land .foot{text-align:center;color:#6b748c;font-size:13px;margin-top:26px;line-height:1.7}

/* auth / login */
.auth-card{width:430px;max-width:100%;height:660px;max-height:calc(100vh - 60px);border-radius:32px;overflow:hidden;box-shadow:0 40px 90px rgba(0,0,0,.5)}
.auth{position:relative;height:100%;flex:1;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;color:#fff}
.auth.teal{background:linear-gradient(155deg,#13b1b1 0%,#0B7A7E 52%,#085457 100%)}
.auth.ind{background:linear-gradient(155deg,#7d76ff 0%,#4F46E5 52%,#332aae 100%)}
.auth .blob{position:absolute;border-radius:50%}
.auth .b1{width:260px;height:260px;background:rgba(255,255,255,.13);top:-90px;right:-70px}
.auth .b2{width:170px;height:170px;background:rgba(255,255,255,.08);top:130px;left:-80px}
.auth .b3{width:84px;height:84px;border:2px solid rgba(255,255,255,.22);top:70px;left:54px}
.auth .b4{width:14px;height:14px;background:rgba(255,255,255,.5);top:150px;right:70px}
.auth .top{position:relative;z-index:1;padding:52px 30px 26px;flex:1}
.auth .badge{width:62px;height:62px;border-radius:19px;background:rgba(255,255,255,.18);display:grid;place-items:center;box-shadow:0 12px 30px rgba(0,0,0,.2)}
.auth .badge svg{width:32px;height:32px}
.auth .brand{font-family:var(--disp);font-weight:800;font-size:30px;margin-top:20px;letter-spacing:-.5px}
.auth .tag{opacity:.86;font-size:14.5px;margin-top:8px;max-width:260px;line-height:1.5}
.auth .asas{margin-top:18px;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:600}
.auth .asas svg{width:15px;height:15px}
.auth .sheet{position:relative;z-index:1;background:#fff;color:var(--ink);border-radius:30px 30px 0 0;padding:26px 26px 28px;box-shadow:0 -12px 40px rgba(0,0,0,.16);animation:sheetUp .3s ease}
@keyframes sheetUp{from{transform:translateY(24px)}to{transform:translateY(0)}}
.auth .sheet h3{font-family:var(--disp);font-size:20px;margin:0 0 4px}
.auth .sheet .sub{color:var(--ink-soft);font-size:13px;margin-bottom:16px}
.phone-in{display:flex;align-items:center;border:1.6px solid var(--line);border-radius:14px;overflow:hidden;transition:.15s}
.phone-in:focus-within{border-color:var(--teal)}
.auth.ind .phone-in:focus-within{border-color:var(--indigo)}
.phone-in .cc{padding:15px 13px;background:#F2F8F8;font-weight:700;color:var(--ink-soft);border-right:1.6px solid var(--line)}
.phone-in input{flex:1;border:none;outline:none;padding:15px 14px;font-size:17px;font-weight:600;letter-spacing:.5px;background:none}
.otp-row{display:flex;gap:11px;justify-content:space-between;margin:4px 0 2px}
.otp-row input{width:100%;aspect-ratio:1;text-align:center;font-size:25px;font-weight:800;border:1.6px solid var(--line);border-radius:15px;outline:none;transition:.15s;background:#F7FBFB;color:var(--ink)}
.otp-row input:focus{border-color:var(--teal);background:#fff;transform:translateY(-2px);box-shadow:0 6px 16px rgba(14,155,160,.18)}
.auth.ind .otp-row input:focus{border-color:var(--indigo);box-shadow:0 6px 16px rgba(79,70,229,.18)}
.auth .hintpill{display:inline-flex;align-items:center;gap:7px;background:var(--marigold-tint);color:var(--marigold-deep);padding:9px 13px;border-radius:11px;font-size:12.5px;font-weight:600;margin-top:14px}
.auth .hintpill svg{width:15px;height:15px}
.auth .lk{background:none;color:var(--teal);font-weight:700;font-size:13.5px;display:inline-flex;align-items:center;gap:5px}
.auth.ind .lk{color:var(--indigo)}
.list-row{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
.list-row:last-child{border-bottom:none}
.photo-tile{aspect-ratio:1;border-radius:13px;background:var(--teal-tint);display:grid;place-items:center;color:var(--teal);border:1.5px dashed var(--teal)}
.photo-tile.has{background-size:cover;border-style:solid}
.empty{text-align:center;padding:40px 22px;color:var(--ink-soft)}
.empty .ic{width:64px;height:64px;border-radius:20px;background:var(--teal-tint);display:grid;place-items:center;margin:0 auto 14px}
.empty .ic svg{width:30px;height:30px;color:var(--teal)}
.qty{display:flex;align-items:center;gap:12px}
.qty button{width:32px;height:32px;border-radius:9px;background:var(--teal-tint);color:var(--teal-deep);font-weight:800;font-size:18px;display:grid;place-items:center}
.seg{display:flex;background:#EEF2F2;border-radius:13px;padding:4px;gap:4px}
.seg button{flex:1;padding:11px;border-radius:10px;font-weight:700;font-size:13.5px;color:var(--ink-soft)}
.seg button.on{background:#fff;color:var(--teal);box-shadow:var(--shadow-sm)}

@media(max-width:560px){
  #stage{padding:0}
  .phone{width:100%;border-radius:0;padding:0;box-shadow:none}
  .phone .notch{display:none}
  .screen{border-radius:0;height:auto;min-height:100vh;max-height:none}
  .viewport{max-height:none}
  .laptop{flex-direction:column;border-radius:0}
  .lt-side{width:100%;flex-direction:row;overflow-x:auto;padding:12px}
  .lt-side .brand{display:none}.lt-side .who{display:none}
  .lt-nav{flex-direction:column;font-size:11px;gap:5px;white-space:nowrap}
  .lt-main{max-height:none}

// Avatar that shows an uploaded photo if present, else coloured initials.
function av(name, color, photo, size){
  const s=size||42;
  if(photo) return `<div class="avatar" style="width:${s}px;height:${s}px;background-image:url('${photo}');background-size:cover;background-position:center"></div>`;

}
// Reads a chosen image file to a data URL and stores it, then re-renders.
function pickPhoto(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const tgt=input.dataset.tgt, id=input.dataset.id;
  const r=new FileReader();
  r.onload=()=>{ if(tgt==='cw') S.cwPhoto=r.result; else if(tgt==='owner'){const p=sp(id); if(p)p.ownerPhoto=r.result;} render(); };
  r.readAsDataURL(f);
}

// Generates a QR-like SVG (finder patterns + deterministic module fill) from a seed string.
function qrCode(seed, size){
  size=size||168; const n=25, cell=size/n;
  let h=2166136261>>>0; const str=String(seed||'')+'@upi';
  for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}
  const rnd=()=>{h=(Math.imul(h,1103515245)+12345)>>>0;return (h>>>17)&1;};
  const fixed=[];for(let y=0;y<n;y++){fixed.push(new Array(n).fill(0));}
  const finder=(gx,gy)=>{for(let y=0;y<7;y++)for(let x=0;x<7;x++){
    const on=(x===0||x===6||y===0||y===6)||(x>=2&&x<=4&&y>=2&&y<=4);
    fixed[gy+y][gx+x]=on?2:1;}};
  finder(0,0);finder(n-7,0);finder(0,n-7);
  let r='';
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){
    const f=fixed[y][x]; let on = f? (f===2) : rnd();
    if(on) r+=`<rect x="${(x*cell).toFixed(2)}" y="${(y*cell).toFixed(2)}" width="${cell.toFixed(2)}" height="${cell.toFixed(2)}"/>`;
  }
  return `<svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;border-radius:12px" fill="#0F2A2B"><rect width="${size}" height="${size}" fill="#fff" rx="12"/>${r}</svg>`;
}

/* ============================================================

============================================================ */
function statusbar(light){
  const t=new Date(); let h=t.getHours(), ap=h>=12?'PM':'AM'; h=h%12||12;
  const mm=String(t.getMinutes()).padStart(2,'0');
  return `<div class="statusbar"${light?' style="color:#fff"':''}><span>${h}:${mm} ${ap}</span>
    <span class="right">${I.wifi}${I.batt}</span></div>`;
}
function phoneFrame(role){
  let inner;
  if(role==='provider') inner = providerApp();

}
function desktopFrame(role){

    ['sa-dash','Dashboard','chart'],['sa-chores','Chores & services','grid'],['sa-providers','Service providers','bldg'],

/* ============================================================
   PROVIDER APP  (HERO)
============================================================ */
function providerApp(){
  const v = curView('sp-home');
  let body, nav=true;
  if(v==='sp-home') body=spHome();
  else if(v==='sp-order') {body=spOrder(view._x); nav=false;}
  else if(v==='sp-price') {body=spPrice(view._x); nav=false;}
  else if(v==='sp-new') {body=spNew(); nav=false;}
  else if(v==='sp-items') {body=editItems(view._x); nav=false;}
  else if(v==='sp-menu') body=spMenu();
  else if(v==='sp-customers') body=spCustomers();
  else if(v.startsWith('sp-addcust')) {body=spAddCust(); nav=false;}
  else if(v==='sp-team') body=spTeam();
  else if(v.startsWith('sp-addcw')) {body=spAddCw(); nav=false;}
  else if(v==='sp-money') body=spMoney();
  else if(v==='sp-shop') body=spShop();
  else body=spHome();
  const navBar = nav?bottomNav('provider',v):'';
  return `<div class="viewport">${body}</div>${navBar}`;
}
function bottomNav(role,v){
  const sets={
    provider:[['sp-home','Home','home'],['sp-menu','Menu','list'],['sp-money','Earnings','wallet'],['sp-team','Team','users'],['sp-shop','Shop','bldg']],

}

  const alert = newOnes.length? `<div class="card pulse" style="margin-top:-26px;position:relative;z-index:2;border:1.5px solid var(--marigold)">

function spHeader(title, back='sp-home'){
  return `<div class="appbar"><div class="row center" style="gap:12px;position:relative;z-index:1">

function spOrder(id){
  const o=ord(id); const c=cust(o.custId); const st=STATUS[o.status];
  const total=orderTotal(o); const comm=orderComm(o);
  const cwName = o.assignedCw ? (o.assignedCw==='self'?'You (pickup)':cw(o.assignedCw).name) : null;

  // timeline
  const flow=flowOf(o); const done=o.t.map(x=>x[0]);
  const curIdx = flow.indexOf(o.status);
  const tl = flow.map((s,i)=>{
    const st2=STATUS[s]; const isDone=i<curIdx, isNow=i===curIdx;
    const tEntry=o.t.find(x=>x[0]===s);
    return `<li class="${isDone?'done':isNow?'now':'pending'}"><span class="nod">${I[isDone||isNow?'check':st2.i]}</span>
      <div><div class="t-main">${st2.l}</div>${tEntry?`<div class="t-sub">${ts(tEntry[1])}</div>`:''}</div></li>`;
  }).join('');

  // item lines
  const items = o.items.length? o.items.map(i=>`<div class="row between" style="padding:9px 0;border-bottom:1px solid var(--line)">
    <div><div class="sb">${i.name}</div><div class="muted" style="font-size:12px">${i.qty} × ${money(i.price)}${i.photos?` · ${i.photos} photo${i.photos>1?'s':''}`:''}</div></div>
    <div class="b">${money(i.qty*i.price)}</div></div>`).join('') : `<div class="muted tac" style="padding:14px">Items not added yet</div>`;

  // primary action by status
  const A = spAction(o);

  return `${spHeader('Order '+o.id)}
  <div class="card" style="margin-top:-22px;position:relative;z-index:2">
    <div class="row between center" style="gap:10px">
      <div class="row center" style="gap:11px;min-width:0;flex:1"><div class="avatar" style="background:var(--teal)">${initials(c.name)}</div>
      <div style="min-width:0"><div class="b" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div><div class="muted" style="font-size:12.5px">${c.phone}</div></div></div>
      <a href="tel:" class="pill teal" style="flex-shrink:0" onclick="return false">${I.phone}Call</a>
    </div>
    <div class="divider"></div>
    <div class="row" style="gap:10px;align-items:flex-start"><div style="color:var(--teal)">${I.location}</div>
      <div><div class="sb" style="font-size:13.5px">${o.type==='pickup'?'Pickup & delivery':'Customer drop-off'}</div>
      <div class="muted" style="font-size:13px">${o.address}</div>
      <div class="muted" style="font-size:13px">${I.clock.replace('width="24"','')} ${o.slot}</div></div></div>
    ${cwName?`<div class="pill grey mt12">${I.truck} ${cwName} assigned</div>`:''}
  </div>

  <div class="card">
    <div class="row between center"><div class="kicker">Items & price</div>${total?`<span class="b">${money(total)}</span>`:''}</div>
    <div class="mt8">${items}</div>
    ${total?`<div class="row between mt12"><span class="muted" style="font-size:12.5px">Your earning ${money(total-comm)} · Platform ${money(comm)}</span></div>`:''}
  </div>

  <div class="card">
    <div class="kicker">Progress</div>
    <ul class="tl mt12">${tl}</ul>
  </div>

  ${A}
  <div style="height:24px"></div>`;
}

function spAction(o){
  const wrap = (html)=>`<div style="margin:0 18px 0">${html}</div>`;
  switch(o.status){
    case 'placed':
      return wrap(`<button class="btn green lg" data-act="confirm" data-x="${o.id}">${I.check} Confirm this order</button>
        <button class="btn ghost mt12" data-act="go" data-v="sp-items" data-x="${o.id}">${I.tag} Add / edit items</button>
        <button class="btn ghost mt12" data-act="reject" data-x="${o.id}">Decline</button>`);
    case 'confirmed':
      if(o.type==='pickup'){
        if(!o.assignedCw){
          const cws=S.coworkers.filter(c=>c.spId==='sp1');
          return wrap(`<div class="b" style="margin-bottom:8px">Who's picking this up?</div>
            <button class="btn" data-act="assignpick" data-x="${o.id}" data-cw="self">${I.user} I'll pick it up myself</button>
            ${cws.map(c=>`<button class="btn ghost mt12" data-act="assignpick" data-x="${o.id}" data-cw="${c.id}" style="justify-content:flex-start;gap:11px">${av(c.name,PERSONAS.coworker.color,c.photo,26)} Send ${c.name}</button>`).join('')}
            <button class="btn ghost mt12" data-act="go" data-v="sp-items" data-x="${o.id}">${I.tag} Add / edit items</button>`);
        }
        const who=o.assignedCw==='self'?'you':cw(o.assignedCw).name;
        return wrap(`<div class="card flush" style="background:var(--teal-tint);color:var(--teal-deep);padding:13px;margin-bottom:12px">${I.truck} Pickup assigned to ${who}${o.assignedCw==='self'?'':' · notified'}</div>
          <button class="btn lg" data-act="pickup" data-x="${o.id}">${I.check} Mark picked up</button>
          <button class="btn ghost sm mt12" data-act="go" data-v="sp-items" data-x="${o.id}">${I.tag} Add / edit items</button>
          <button class="btn ghost sm mt12" data-act="reassign" data-x="${o.id}">Change who picks up</button>`);
      }
      return wrap(`<button class="btn lg" data-act="go" data-v="sp-price" data-x="${o.id}">${I.tag} Add items & set price</button>`);
    case 'picked_up':
      return wrap(`<button class="btn lg" data-act="go" data-v="sp-price" data-x="${o.id}">${I.tag} Add items & set price</button>`);
    case 'priced':
      return wrap(`<div class="card flush" style="background:var(--marigold-tint);text-align:center;padding:16px">${I.clock}
        <div class="b mt8">Waiting for customer to approve the price</div>
        <div class="muted" style="font-size:13px">They've been notified on their phone</div></div>`);
    case 'approved':
      return wrap(`<button class="btn lg" data-act="advance" data-x="${o.id}" data-to="in_progress">${I.drop} Start working</button>`);
    case 'in_progress':
      return wrap(`<button class="btn lg" data-act="advance" data-x="${o.id}" data-to="ready">${I.sparkle} Mark ready</button>`);
    case 'ready':
      if(o.type==='pickup') return wrap(`<button class="btn lg" data-act="advance" data-x="${o.id}" data-to="out_for_delivery">${I.truck} Send out for delivery</button>`);
      return wrap(`<button class="btn lg" data-act="advance" data-x="${o.id}" data-to="delivered">${I.box} Customer collected</button>`);
    case 'out_for_delivery':
      return wrap(`<button class="btn lg" data-act="advance" data-x="${o.id}" data-to="delivered">${I.box} Mark delivered</button>`);
    case 'delivered':
      if(o.paySubmitted && !o.paid){
        return wrap(`<div class="card flush" style="background:var(--marigold-tint);padding:15px;margin-bottom:12px">
          <div class="b" style="color:var(--marigold-deep)">${o.payMethod==='upi'?'Customer paid '+money(orderTotal(o))+' by UPI':'Customer says cash paid · '+money(orderTotal(o))}</div>
          <div class="muted" style="font-size:13px;margin-top:3px">${o.payMethod==='upi'?'They attached a payment screenshot. Check your UPI app, then confirm.':'Collect the cash, then confirm.'}</div>
          ${o.payMethod==='upi'?`<button class="btn ghost sm mt12" data-act="toast" data-m="Opening screenshot (demo)">${I.camera} View screenshot</button>`:''}
        </div>
        <button class="btn green lg" data-act="confirmpay" data-x="${o.id}">${I.check} Confirm payment received</button>`);
      }
      return wrap(`<div class="b" style="margin-bottom:10px">${I.rupee} Collect payment — ${money(orderTotal(o))}</div>
        <div class="row" style="gap:10px">
        <button class="btn green" data-act="pay" data-x="${o.id}" data-m="inapp">${I.card} Paid in app</button>
        <button class="btn ghost" data-act="pay" data-x="${o.id}" data-m="cash">${I.cash} Cash received</button></div>
        <div class="muted tac" style="font-size:12px;margin-top:10px">Or wait for the customer to pay by UPI from their app</div>`);
    case 'paid':
      return wrap(`<button class="btn dark lg" data-act="advance" data-x="${o.id}" data-to="closed">${I.checkc} Close order</button>`);
    case 'closed':
      return wrap(`<div class="card flush" style="background:var(--green-tint);text-align:center;padding:16px;color:var(--green)">${I.checkc}
        <div class="b mt8">Order completed${o.payMethod==='inapp'?' · paid in app':o.payMethod==='upi'?' · paid by UPI':o.payMethod==='cash'?' · paid by cash':''}</div></div>`);
  }
  return '';
}

function editItems(id){
  const o=ord(id); const me=sp(o.spId)||sp('sp1');
  const coworkerMode = S.session.role==='coworker';

function spPrice(id){
  const o=ord(id);

  // working copy stored on order.draft — pre-fill from any items the customer already listed
  if(!o.draft) o.draft = me.services.map(s=>{
    const ex=o.items.find(it=>it.sid===s.id);
    return {sid:s.id, name:svc(s.id).name, qty: ex?ex.qty:0, price: ex?ex.price:s.price, photos: ex?(ex.photos||0):0};
  });
  const lines = o.draft.map((l,idx)=>{
    const d=svc(l.sid);
    return `<div class="card flush" style="margin:0 0 12px;padding:14px">
      <div class="row between center">
        <div class="row center" style="gap:10px"><div class="avatar" style="background:var(--teal-tint);color:var(--teal-deep);width:38px;height:38px">${I[d.icon]}</div>
        <div><div class="sb">${l.name}</div><div class="muted" style="font-size:12px">${money(l.price)} / ${d.unit}</div></div></div>
        <div class="qty"><button data-act="qty" data-x="${id}" data-i="${idx}" data-d="-1">−</button>
          <span class="b" style="min-width:22px;text-align:center">${l.qty}</span>
          <button data-act="qty" data-x="${id}" data-i="${idx}" data-d="1">+</button></div>
      </div>
      ${l.qty>0?`<div class="row mt12" style="gap:10px">
        <button class="btn ghost sm" data-act="addphoto" data-x="${id}" data-i="${idx}">${I.camera} Photo ${l.photos?`(${l.photos})`:''}</button>
        <div class="grow tar b" style="align-self:center">${money(l.qty*l.price)}</div></div>`:''}
    </div>`;
  }).join('');
  const total = o.draft.reduce((s,l)=>s+l.qty*l.price,0);

/* ============================================================
   ACTIONS
============================================================ */
function advance(id,to){
  const o=ord(id); o.status=to; o.t.push([to,Date.now()]);
}
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]'); if(!el) return;
  const a=el.dataset.act, x=el.dataset.x;
  switch(a){
    case 'enter': enter(el.dataset.role); break;
    case 'help': S.helpOpen=!S.helpOpen; renderHelp(); break;
    case 'helpclose': S.helpOpen=false; renderHelp(); break;
    case 'switcher': logout(); break;
    case 'logout': logout(); break;
    case 'otpfill': ['otp0','otp1','otp2','otp3'].forEach(id=>{const e=$(id); if(e)e.value='0';}); break;
    case 'login': {
      const code=['otp0','otp1','otp2','otp3'].map(id=>($(id)&&$(id).value||'')).join('');
      if(code!=='0000'){ toast('Demo code is 0000','info'); break; }
      const key=($('lg-persona')&&$('lg-persona').value)||S.login.persona||'provider';
      const p=PERSONAS[key];
      S.session={role:p.role,id:p.id||null,persona:key,authed:true};
      S.helpOpen=false; view={}; toast('Welcome, '+p.name.split(/[ —]/)[0]+'!'); render(); } break;
    case 'go': go(el.dataset.v, el.dataset.x); break;
    case 'toast': toast(el.dataset.m||'Demo action'); break;

    /* provider */
    case 'confirm': advance(x,'confirmed'); toast('Order confirmed'); go('sp-order',x); break;
    case 'reject': { const o=ord(x); o.status='closed'; o.t.push(['closed',Date.now()]); toast('Order declined'); go('sp-home'); } break;
    case 'pickup': { advance(x,'picked_up'); toast('Marked picked up'); go('sp-order',x); } break;
    case 'assignpick': { const o=ord(x); o.assignedCw=el.dataset.cw; toast(el.dataset.cw==='self'?"You'll pick this up":'Sent to '+cw(el.dataset.cw).name); go('sp-order',x); } break;
    case 'reassign': { ord(x).assignedCw=null; render(); } break;
    case 'confirmpay': { const o=ord(x); o.paid=true; advance(x,'paid'); advance(x,'closed');
      toast(o.payMethod==='inapp'?'Confirmed':'Payment confirmed · fee added to dues');
      go(S.session.role==='coworker'?'cw-tasks':'sp-order', x); } break;
    case 'advance': advance(x,el.dataset.to); toast('Updated'); go(view[S.session.role].startsWith('sp')?'sp-order':'cw-tasks', x); break;
    case 'qty': { const o=ord(x); const l=o.draft[+el.dataset.i]; l.qty=Math.max(0,l.qty+(+el.dataset.d)); render(); } break;
    case 'addphoto': { const o=ord(x); o.draft[+el.dataset.i].photos++; toast('Photo added (demo)','camera'); render(); } break;
    case 'saveitems': { const o=ord(x); o.items=o.draft.filter(l=>l.qty>0).map(l=>({sid:l.sid,name:l.name,qty:l.qty,price:l.price,photos:l.photos})); delete o.draft;
      toast(o.items.length?'Items saved':'Items cleared');
      go(S.session.role==='coworker'?'cw-task':'sp-order', x); } break;
    case 'sendprice': { const o=ord(x); o.items=o.draft.filter(l=>l.qty>0).map(l=>({sid:l.sid,name:l.name,qty:l.qty,price:l.price,photos:l.photos})); delete o.draft;
      if(o.walkin){ advance(x,'in_progress'); toast('Order created — work started'); }
      else { advance(x,'priced'); toast('Price sent to customer'); }
      go('sp-order',x); } break;
    case 'pay': { const o=ord(x); o.payMethod=el.dataset.m; o.paid=true; advance(x,'paid'); toast(el.dataset.m==='inapp'?'Paid in app · fee auto-settled':'Marked cash · fee billed to you'); go('sp-order',x); } break;
    case 'sntype': { if($('sn-cust')) S.spDraft.custId=$('sn-cust').value; S.spDraft.type=el.dataset.t; render(); } break;
    case 'spnew': {
      const custId=$('sn-cust')?$('sn-cust').value:(S.spDraft&&S.spDraft.custId);
      const d=S.spDraft||{type:'dropoff'}; const c=cust(custId);
      const id='ML-'+(UID++);
      S.orders.unshift({id,spId:'sp1',custId,type:d.type,status:'confirmed',walkin:true,
        address:d.type==='pickup'?(c.address||'—'):'Counter drop-off', slot:d.type==='pickup'?'Today, 6–8 PM':'At counter',
        assignedCw:null,payMethod:null,paid:false,items:[],t:[['placed',Date.now()],['confirmed',Date.now()]]});
      S.spDraft=null; go('sp-price',id); } break;
    case 'savecust': {
      const n=$('nc-name').value.trim(), p=$('nc-phone').value.trim();
      if(!n||!p){toast('Add name and number','info');break;}
      const id='cu'+(Date.now()); S.customers.push({id,name:n,phone:p,providers:['sp1'],address:$('nc-addr').value||'—'});
      toast('Customer added · invite SMS sent'); go('sp-customers'); } break;
    case 'savecw': {
      const n=$('cw-name').value.trim(), p=$('cw-phone').value.trim();
      if(!n||!p){toast('Add name and number','info');break;}
      S.coworkers.push({id:'cw'+Date.now(),spId:'sp1',name:n,phone:p,job:'Laundry staff',photo:S.cwPhoto||null});
      S.cwPhoto=null; toast('Staff member added'); go('sp-team'); } break;
    case 'rmcw': { S.coworkers=S.coworkers.filter(c=>c.id!==x); toast('Coworker removed'); render(); } break;
    case 'editprice': S.editSvc=x; render(); break;
    case 'cancelprice': S.editSvc=null; render(); break;
    case 'saveprice': {
      const inp=$('ep-'+x); const v=parseFloat(inp&&inp.value);
      if(isNaN(v)||v<0){toast('Enter a valid price','info');break;}
      const row=sp('sp1').services.find(s=>s.id===x); if(row) row.price=v;
      S.editSvc=null; toast('Price updated to '+money(v)); render(); } break;
    case 'addsvc': {
      const d=svc(x); sp('sp1').services.push({id:x,price:d.price,fee:d.comm});
      S.editSvc=x; toast(d.name+' added — set your price'); render(); } break;
    case 'editupi': S.editUpi=true; render(); break;
    case 'cancelupi': S.editUpi=false; render(); break;
    case 'saveupi': { const v=($('up-id')&&$('up-id').value||'').trim();
      if(!v){toast('Enter a UPI ID','info');break;}
      sp('sp1').upi=v; sp('sp1').qr=true; S.editUpi=false; toast('UPI ID & QR updated'); render(); } break;

    /* coworker */
    case 'cwpick': advance(x,'picked_up'); toast('Marked picked up'); go('cw-tasks'); break;
    case 'cwdeliver': advance(x,'delivered'); toast('Marked delivered'); go('cw-tasks'); break;

    /* customer */
    case 'dtype': S.draftOrder.type=el.dataset.t; render(); break;
    case 'pickshop': { S.draftOrder=S.draftOrder||{type:'pickup',slot:'Today, 5–7 PM'}; S.draftOrder.spId=x; S.draftOrder.items=null; render(); } break;
    case 'cqty': { const l=S.draftOrder.items[+el.dataset.i]; l.qty=Math.max(0,l.qty+(+el.dataset.d)); render(); } break;
    case 'placeorder': {
      const me=cust(S.session.id); const d=S.draftOrder||{type:'pickup',slot:'Today, 5–7 PM'};
      const spId=d.spId||me.providers[0];
      if(!spId){ toast('Choose a laundry first','info'); break; }
      const id='ML-'+(UID++);
      const addr=$('d-addr')?$('d-addr').value:'Shop drop-off';
      const slot=$('d-slot')?$('d-slot').value:'Drop-off at shop';
      const items=(d.items||[]).filter(l=>l.qty>0).map(l=>({sid:l.sid,name:l.name,qty:l.qty,price:l.price,photos:0}));
      const newlyLinked=!me.providers.includes(spId);
      if(newlyLinked) me.providers.push(spId);
      S.orders.unshift({id,spId,custId:me.id,type:d.type,status:'placed',address:addr,slot:slot,assignedCw:null,payMethod:null,paid:false,items,t:[['placed',Date.now()]]});
      S.draftOrder=null;
      toast(newlyLinked?('You\'re now linked to '+sp(spId).shop+'! 🎉'):(items.length?'Order sent with your list! 🎉':'Order sent to '+sp(spId).shop+'! 🎉'));
      go('cust-order',id); } break;
    case 'approve': advance(x,'approved'); toast('Price approved — work can start'); go('cust-order',x); break;
    case 'custpay': { const o=ord(x); o.payMethod=el.dataset.m; o.paid=true; advance(x,'paid'); advance(x,'closed'); toast(el.dataset.m==='inapp'?'Paid! Thank you':'Marked cash'); go('cust-order',x); } break;
    case 'custpayproof': { const o=ord(x); o.payMethod='upi'; o.paySubmitted=true; o.payProof=1; toast('Screenshot sent — shop will confirm','camera'); go('cust-order',x); } break;
    case 'custcash': { const o=ord(x); o.payMethod='cash'; o.paySubmitted=true; toast('Pay the delivery person — they will confirm'); go('cust-order',x); } break;
    case 'reqshop': { const me=cust(S.session.id); S.linkRequests.push({id:'lr'+Date.now(),custId:me.id,spId:x,status:'pending'});
      toast(S.settings.approvalGate?'Request sent for approval':'Shop added');
      if(!S.settings.approvalGate){me.providers.push(x); S.linkRequests.pop();}
      go('cust-shops'); } break;

    /* superadmin */
    case 'flag': S.settings[el.dataset.k]=!S.settings[el.dataset.k]; toast('Feature '+(S.settings[el.dataset.k]?'turned on':'turned off')); render(); break;
    case 'assignpm': { sp(x).pmId='pm1'; sp(x).status='pending'; toast('Assigned to Anita Rao'); render(); } break;
    case 'payout': { toast('Payout released to '+sp(x).shop); el.outerHTML='<span class="pill green">'+I.check+'Released</span>'; } break;
    case 'payoutall': toast('All payouts released 🎉'); break;

    /* partner manager */
    case 'activate': {
      const p=sp(x); const picked=[...document.querySelectorAll('.ob-svc:checked')].map(i=>i.value);
      if(!picked.length){toast('Pick at least one service','info');break;}
      p.services=picked.map(sid=>{
        const fi=document.querySelector('.ob-fee[data-sid="'+sid+'"]');
        let fee=fi?parseFloat(fi.value):svc(sid).comm; if(isNaN(fee)||fee<0) fee=svc(sid).comm;
        return {id:sid, price:svc(sid).price, fee};
      });
      p.status='active'; p.rating=5.0; p.hours=$('ob-hours').value||'9 AM – 8 PM';
      p.gst=$('ob-gst').value||'—'; p.bank=$('ob-bank').value||'—'; p.since='2026';
      const u=$('ob-upi')&&$('ob-upi').value.trim(); if(u){p.upi=u;p.qr=true;}
      view.pm='pm-portfolio'; view._x=null; toast(p.shop+' is now live! 🎉'); render(); } break;
    case 'apprreq': { const r=S.linkRequests.find(z=>z.id===x); r.status='approved'; cust(r.custId).providers.push(r.spId); toast('Approved — customer can now use both shops'); render(); } break;
    case 'rejreq': { const r=S.linkRequests.find(z=>z.id===x); r.status='rejected'; S.linkRequests=S.linkRequests.filter(z=>z.id!==x); toast('Request declined'); render(); } break;
  }
});

/* boot */
render();
</script>
</body>
</html>
